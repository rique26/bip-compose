name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Inject Google Services JSON
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app/src/debug
          mkdir -p app/src/release
          echo "$GOOGLE_SERVICES_BASE64" | base64 -d > app/src/debug/google-services.json
          echo "$GOOGLE_SERVICES_BASE64" | base64 -d > app/src/release/google-services.json

      - name: Build debug APK
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk